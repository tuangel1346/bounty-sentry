name: refresh bounty report

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-bounty-report
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate current report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 bounty_scanner.py --days 30 --limit 20 --format markdown --output REPORT.md
      - name: Publish changes
        run: |
          if git diff --quiet -- REPORT.md; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add REPORT.md
          git commit -m "chore: refresh bounty report"
          git push
